AgentGroups:
  - &builders  [2000, 2001, 2002, 2003, 2004, 2005]
  - &traders   [1000, 1001, 1002, 1003, 1004, 1005]
  - &operators [500, 501, 502, 503, 504, 505]
  - &exchange 1
  - &carbonMarket 3
  - &fuelsMarket 4
