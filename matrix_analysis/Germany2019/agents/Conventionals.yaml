    Id: 2000
    Attributes:
      PortfolioBuildingOffsetInSeconds: *portfolioBuildingOffset
      Prototype:
        FuelType: NUCLEAR
        SpecificCo2EmissionsInTperMWH: 0.0
        OutageFactor: "./timeseries/nuclear_outage.csv"
        MustRunFactor: "./timeseries/nuclear_must_run.csv"
        OpexVarInEURperMWH: 0.5
        CyclingCostInEURperMW: 0.0
      Efficiency:
        Minimal: 0.330
        Maximal: 0.331
      BlockSizeInMW: 900.0
      InstalledPowerInMW: 9524.0

  - Type: PredefinedPlantBuilder
